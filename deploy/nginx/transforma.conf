server {
  listen 80;
  server_name transformaeducacaopb.com.br www.transformaeducacaopb.com.br;

  # Padrao do nginx e 1MB, menor que o limite de 5MB que o backend aceita
  # (express.json({ limit: '5mb' })) -- capas de curso/avatares em base64
  # passavam disso e o nginx rejeitava com 413 antes de chegar no backend.
  client_max_body_size 8m;

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
