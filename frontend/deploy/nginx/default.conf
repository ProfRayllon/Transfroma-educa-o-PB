server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Padrao do nginx e 1MB, menor que o limite de 5MB que o backend aceita
  # (express.json({ limit: '5mb' })) -- capas de curso/avatares em base64
  # passavam disso e esse nginx (dentro do container do frontend, na frente
  # do proxy_pass para a api) rejeitava com 413 antes de chegar no backend.
  client_max_body_size 8m;

  location /api/ {
    proxy_pass http://api:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
