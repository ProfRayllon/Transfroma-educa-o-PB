name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          if [ -z "$VPS_PORT" ]; then VPS_PORT=22; fi
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" <<'EOF'
          set -euo pipefail

          APP_DIR=/opt/transforma
          HEALTH_URL=http://127.0.0.1/api/health

          cd "$APP_DIR"

          git fetch origin main
          git reset --hard origin/main

          docker compose up -d --build --force-recreate

          attempts=20
          for i in $(seq 1 "$attempts"); do
            if curl -fsS "$HEALTH_URL" >/tmp/transforma-health.json; then
              cat /tmp/transforma-health.json
              exit 0
            fi

            sleep 3
          done

          echo "Health check falhou apos ${attempts} tentativas." >&2
          docker compose logs --tail=200 api web >&2
          exit 1
          EOF
